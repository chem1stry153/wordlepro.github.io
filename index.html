<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wordle</title>
    <link rel="icon" type="image/png" href="wordle_logo_32x32.png">

    <!-- 引入官方替代字体 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Libre+Franklin:wght@100..900&family=Roboto+Slab:wght@100..900&display=swap"
        rel="stylesheet">

    <style>
        /* 修改后的 :root 部分 */
        :root {
            /* 浅色模式 - 官网标准色 */
            --green: #6aaa64;
            --yellow: #c9b458;
            --gray: #787c7e;
            --border-empty: #d3d6da;
            --border-filled: #878a8c;
            --bg: #ffffff;
            --text: #000000;
            --text-muted: #787c7e;
            --key-bg: #d3d6da;
            --key-text: #000000;
            --tile-text: #ffffff;
            --header-border: #d3d6da;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Libre Franklin', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        body.dark-mode {
            /* 黑暗模式 - 官网适配色 */
            --green: #538d4e;
            /* 更深一点的绿 */
            --yellow: #b59f3b;
            /* 更深一点的黄 */
            --gray: #3a3a3c;
            /* 显著变深的灰色 */
            --border-empty: #3a3a3c;
            --border-filled: #565758;
            --bg: #121213;
            --text: #ffffff;
            --text-muted: #818384;
            --key-bg: #818384;
            /* 键盘未使用的按键背景 */
            --key-text: #ffffff;
            --tile-text: #ffffff;
            --header-border: #3a3a3c;
        }

        header {
            width: 100%;
            height: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-bottom: 1px solid var(--header-border);
            font-family: 'Roboto Slab', serif;
            font-size: 32px;
            font-weight: 700;
            letter-spacing: -0.02em;
            position: relative;
            z-index: 30;
            flex-shrink: 0;
        }

        .header-controls {
            position: absolute;
            left: 10px;
            display: flex;
            gap: 5px;
        }

        .icon-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px;
            display: flex;
            align-items: center;
            border-radius: 4px;
            transition: background-color 0.2s;
            outline: none;
            fill: var(--text);
        }

        .icon-btn:hover {
            background-color: rgba(120, 120, 120, 0.1);
        }

        .icon-btn svg {
            width: 24px;
            height: 24px;
        }

        header img {
            width: 32px;
            height: 32px;
            margin-right: 5px;
            /* 间距 5px */
        }

        #main-layout {
            display: flex;
            flex-grow: 1;
            width: 100%;
            position: relative;
            overflow: hidden;
        }

        /* 提示面板：绝对定位在左侧，全高 */
        #hint-panel {
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 200px;
            background-color: var(--bg);
            border-right: 1px solid var(--border-empty);
            z-index: 20;
            display: none;
            flex-direction: column;
            box-shadow: 2px 0 10px rgba(0, 0, 0, 0.05);
            animation: slideIn 0.2s ease-out;
        }

        @keyframes slideIn {
            from {
                transform: translateX(-100%);
            }

            to {
                transform: translateX(0);
            }
        }

        #hint-header {
            padding: 15px 10px;
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            border-bottom: 1px solid var(--border-empty);
            text-align: center;
            color: var(--text-muted);
            letter-spacing: 0.5px;
        }

        #hint-list {
            flex-grow: 1;
            overflow-y: auto;
            padding: 10px 0;
            font-family: 'Libre Franklin', sans-serif;
            font-weight: 700;
            font-size: 17px;
            line-height: 2.2;
            text-transform: uppercase;
            text-align: center;
        }

        #hint-list::-webkit-scrollbar {
            width: 4px;
        }

        #hint-list::-webkit-scrollbar-thumb {
            background: var(--border-empty);
        }

        /* 提示面板容器 */
        #hint-list-container {
            flex-grow: 1;
            overflow-y: auto;
            padding: 10px 0;
        }

        /* 高性能渲染区域：使用 pre 保留换行，textContent 写入 */
        #hint-list-pre {
            margin: 0;
            font-family: 'Libre Franklin', sans-serif;
            font-weight: 700;
            font-size: 17px;
            line-height: 2.2;
            text-transform: uppercase;
            text-align: center;
            color: var(--text);
        }

        /* 隐藏滚动条但保留功能 (可选) */
        #hint-list-container::-webkit-scrollbar {
            width: 4px;
        }

        #hint-list-container::-webkit-scrollbar-thumb {
            background: var(--border-empty);
        }

        /* 按钮冷却状态 */
        .icon-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        /* 作答区：始终保持全屏居中 */
        #game-area {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
        }

        #game-container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 10px;
        }

        #board {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            grid-gap: 5px;
            width: 330px;
            height: 400px;
            padding: 10px;
            visibility: hidden;
        }

        /* 键盘：等宽设计 */
        #keyboard {
            width: 100%;
            padding: 0 10px 20px;
            flex-shrink: 0;
        }

        .keyboard-row {
            display: flex;
            justify-content: center;
            margin-bottom: 8px;
            gap: 6px;
        }

        .key {
            background-color: var(--key-bg);
            border: 0;
            border-radius: 4px;
            height: 58px;
            width: 43px;
            /* 普通按键等宽 */
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Libre Franklin', sans-serif;
            font-weight: 700;
            font-size: 20px;
            cursor: pointer;
            color: var(--key-text);
            text-transform: uppercase;
            outline: none;
            fill: var(--key-text);
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .key.wide {
            width: 65px;
            /* 功能键等宽 */
            font-size: 12px;
        }

        .key[data-state="correct"] {
            background-color: var(--green);
            color: #ffffff;
        }

        .key[data-state="present"] {
            background-color: var(--yellow);
            color: #ffffff;
        }

        .key[data-state="absent"] {
            background-color: var(--gray);
            color: #ffffff;
        }

        .key svg {
            width: 24px;
            height: 24px;
            pointer-events: none;
        }

        .tile {
            width: 100%;
            aspect-ratio: 1 / 1;
            border: 2px solid var(--border-empty);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
            font-weight: 700;
            text-transform: uppercase;
            box-sizing: border-box;
            user-select: none;
            backface-visibility: hidden;
        }

        .tile[data-state="filled"] {
            border-color: var(--border-filled);
        }

        .tile[data-state="correct"] {
            background-color: var(--green);
            border-color: var(--green);
            color: var(--tile-text);
        }

        .tile[data-state="present"] {
            background-color: var(--yellow);
            border-color: var(--yellow);
            color: var(--tile-text);
        }

        .tile[data-state="absent"] {
            background-color: var(--gray);
            border-color: var(--gray);
            color: var(--tile-text);
        }

        .pop {
            animation: pop 0.1s ease-in-out;
        }

        @keyframes pop {
            50% {
                transform: scale(1.1);
            }
        }

        .flip {
            animation: flip 0.5s ease-in forwards;
        }

        @keyframes flip {
            0% {
                transform: rotateX(0);
            }

            50% {
                transform: rotateX(90deg);
            }

            100% {
                transform: rotateX(0);
            }
        }

        .shake {
            animation: shake 600ms ease-in-out;
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            10%,
            30%,
            50%,
            70%,
            90% {
                transform: translateX(-4px);
            }

            20%,
            40%,
            60%,
            80% {
                transform: translateX(4px);
            }
        }

        #toast-container {
            position: fixed;
            top: 10%;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            pointer-events: none;
            width: 100%;
        }

        .toast {
            background-color: var(--text);
            color: var(--bg);
            padding: 12px 18px;
            border-radius: 4px;
            font-family: 'Libre Franklin', sans-serif;
            font-weight: 700;
            margin-bottom: 10px;
            width: fit-content;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            opacity: 1;
            transition: opacity 0.4s ease;
        }

        .toast-green {
            color: var(--green);
            /* 增加亮度，防止在黑色背景下看不清 */
            filter: brightness(1.2);
            font-weight: 900;
        }

        .toast-yellow {
            color: var(--yellow);
            filter: brightness(1.2);
            font-weight: 900;
        }

        /* 高对比度模式适配 */
        body.high-contrast .toast-green {
            color: var(--green);
        }

        body.high-contrast .toast-yellow {
            color: var(--yellow);
        }

        #loading {
            position: absolute;
            top: 50%;
            font-weight: 700;
        }

        #start-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #e3e3e1;
            /* 官网米灰色 */
            color: #000000;
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.4s ease-out;
        }

        .start-content {
            text-align: center;
            width: 100%;
            max-width: 500px;
        }

        .start-logo {
            width: 80px;
            height: 80px;
            margin-bottom: 12px;
        }

        .start-title {
            font-family: 'Roboto Slab', serif;
            font-size: 50px;
            font-weight: 700;
            margin: 0 0 12px;
        }

        .start-subtitle {
            font-family: 'Roboto Slab', sans-serif;
            font-size: 38px;
            font-weight: 350;
            margin: 0 0 36px;
        }

        .play-btn {
            background: #000;
            color: #fff;
            border: none;
            border-radius: 30px;
            height: 48px;
            width: 150px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .play-btn:active {
            transform: scale(0.96);
        }

        .hidden {
            opacity: 0;
            pointer-events: none;
        }

        .toast {
            background-color: var(--text);
            color: var(--bg);
            padding: 12px 18px;
            border-radius: 4px;
            font-family: 'Libre Franklin', sans-serif;
            font-weight: 700;
            margin-bottom: 10px;
            width: fit-content;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            opacity: 1;

            /* 核心修改：添加高度和边距的过渡 */
            transition:
                opacity 0.4s ease,
                transform 0.4s ease,
                max-height 0.4s ease,
                margin 0.4s ease,
                padding 0.4s ease;

            overflow: hidden;
            /* 必须：防止收缩时内容溢出 */
            max-height: 100px;
            /* 给一个足够大的初始高度 */
        }

        /* 消失时的状态 */
        .toast.hide {
            opacity: 0;
            transform: translateY(-20px);
            /* 向上轻微漂移 */
            max-height: 0;
            /* 高度缩减到0 */
            margin-bottom: 0;
            /* 间距缩减到0 */
            padding-top: 0;
            /* 内边距缩减到0 */
            padding-bottom: 0;
            border: 0;
        }

        /* 胜利跳动动画 */
        @keyframes bounce {

            0%,
            20% {
                transform: translateY(0);
            }

            40% {
                transform: translateY(-30px);
            }

            50% {
                transform: translateY(5px);
            }

            60% {
                transform: translateY(-15px);
            }

            80% {
                transform: translateY(2px);
            }

            100% {
                transform: translateY(0);
            }
        }

        .bounce {
            animation: bounce 1000ms ease-in-out;
        }

        /* 模态框背后的遮罩 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            display: none;
            /* 默认隐藏 */
            justify-content: center;
            align-items: center;
            z-index: 2000;
            backdrop-filter: blur(2px);
        }

        /* 弹窗主体 */
        .modal-content {
            background-color: var(--bg);
            color: var(--text);
            padding: 32px;
            border-radius: 8px;
            box-shadow: 0 4px 23px 0 rgba(0, 0, 0, 0.2);
            width: 90%;
            max-width: 400px;
            text-align: center;
            font-family: 'Libre Franklin', sans-serif;
            animation: modalPop 0.2s ease-out;
        }

        @keyframes modalPop {
            from {
                transform: scale(0.8);
                opacity: 0;
            }

            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        #modal-message {
            margin-bottom: 24px;
            font-size: 18px;
            line-height: 1.4;
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .modal-btn {
            padding: 12px 24px;
            border-radius: 4px;
            border: none;
            cursor: pointer;
            font-weight: 700;
            font-size: 14px;
            text-transform: uppercase;
            transition: filter 0.2s;
        }

        /* 确定按钮：黑色(浅色模式)或白色(深色模式) */
        .modal-btn.confirm {
            background-color: var(--text);
            color: var(--bg);
        }

        /* 取消按钮：灰色 */
        .modal-btn.cancel {
            background-color: var(--gray);
            color: #ffffff;
        }

        .modal-btn:hover {
            filter: brightness(1.2);
        }

        /* 设置面板专用样式 */
        .settings-content {
            max-width: 480px;
            padding: 16px 32px;
            text-align: left;
        }

        .settings-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .settings-header h2 {
            margin: 0;
            font-size: 16px;
            letter-spacing: 0.1em;
            color: var(--text-muted);
        }

        .setting-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 0;
            border-bottom: 1px solid var(--header-border);
        }

        .setting-text {
            display: flex;
            flex-direction: column;
        }

        .setting-label {
            font-size: 18px;
        }

        .setting-desc {
            font-size: 12px;
            color: var(--text-muted);
        }

        /* Switch 开关样式 */
        .switch {
            position: relative;
            display: inline-block;
            width: 32px;
            height: 20px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: var(--gray);
            transition: .4s;
            border-radius: 20px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 14px;
            width: 14px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked+.slider {
            background-color: var(--green);
        }

        input:checked+.slider:before {
            transform: translateX(12px);
        }

        /* 高对比度模式下的根变量覆盖 */
        body.high-contrast {
            --green: #f5793a;
            /* 橘色替代绿色 */
            --yellow: #85c0f9;
            /* 浅蓝替代黄色 */
        }

        /* 设置中的 Select 样式 */
        #lang-select-settings {
            background: var(--bg);
            color: var(--text);
            border: 1px solid var(--border-empty);
            padding: 5px;
            border-radius: 4px;
        }
    </style>
</head>

<body>
    <div id="start-screen">
        <div class="start-content">
            <img src="wordle-icon.svg" class="start-logo">
            <h1 class="start-title">Wordle</h1>
            <p class="start-subtitle">Get 6 chances to guess a <span style="white-space:nowrap">5-letter</span> word.
            </p>
            <button class="play-btn" onclick="dismissStartScreen()">Play</button>
        </div>
    </div>
    <!-- Header 部分 -->
    <header>
        <div class="header-controls">
            <button class="icon-btn" id="reset-btn" title="Restart" onclick="resetGame()">
                <svg viewBox="0 0 24 24">
                    <path
                        d="M17.65,6.35C16.2,4.9 14.21,4 12,4c-4.42,0-7.99,3.58-7.99,8s3.57,8,7.99,8c3.73,0,6.84-2.55,7.73-6h-2.08 c-0.82,2.33-3.04,4-5.65,4c-3.31,0-6-2.69-6-6s2.69-6,6-6c1.66,0,3.14,0.69,4.22,1.78L13,11h7V4L17.65,6.35z" />
                </svg>
            </button>
            <button class="icon-btn" id="mode-toggle-btn" title="Toggle Mode" onclick="toggleWordMode()">
                <svg id="mode-icon" viewBox="0 0 24 24">
                    <path
                        d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z" />
                </svg>
            </button>
            <button class="icon-btn" title="Hints" onclick="toggleHints()">
                <svg viewBox="0 0 24 24">
                    <path
                        d="M9 21c0 .55.45 1 1 1h4c.55 0 1-.45 1-1v-1H9v1zm3-19C8.14 2 5 5.14 5 9c0 2.38 1.19 4.47 3 5.74V17c0 .55.45 1 1 1h6c.55 0 1-.45 1-1v-2.26c1.81-1.27 3-3.36 3-5.74 0-3.86-3.14-7-7-7zm2.85 11.1l-.85.6V16h-4v-1.3l-.85-.6C7.8 13.15 7 11.18 7 9c0-2.76 2.24-5 5-5s5 2.24 5 5c0 2.18-.8 4.15-2.15 5.1z" />
                </svg>
            </button>
        </div>

        <img src="wordle-icon.svg" alt="Logo"> Wordle

        <div class="header-settings">
            <button class="icon-btn" onclick="openSettings()">
                <svg viewBox="0 0 24 24">
                    <path
                        d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.07-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.74,8.87 C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.81,11.69,4.81,12.01c0,0.31,0.02,0.64,0.07,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.44-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.47-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z" />
                </svg>
            </button>
        </div>
    </header>

    <!-- 设置模态框 -->
    <div id="settings-modal" class="modal-overlay">
        <div class="modal-content settings-content">
            <div class="settings-header">
                <h2 id="settings-title">SETTINGS</h2>
                <button class="icon-btn" onclick="closeSettings()">
                    <svg viewBox="0 0 24 24">
                        <path
                            d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z" />
                    </svg>
                </button>
            </div>

            <div class="setting-item">
                <div class="setting-text">
                    <div class="setting-label" id="label-hard-mode">Hard Mode</div>
                    <div class="setting-desc" id="desc-hard-mode">Any revealed hints must be used in subsequent guesses
                    </div>
                </div>
                <label class="switch">
                    <input type="checkbox" id="setting-hard-mode" onchange="toggleHardMode(this.checked)">
                    <span class="slider"></span>
                </label>
            </div>

            <div class="setting-item">
                <div class="setting-text">
                    <div class="setting-label" id="label-dark-mode">Dark Mode</div>
                </div>
                <label class="switch">
                    <input type="checkbox" id="setting-dark-mode" onchange="toggleTheme(this.checked)">
                    <span class="slider"></span>
                </label>
            </div>

            <div class="setting-item">
                <div class="setting-text">
                    <div class="setting-label" id="label-high-contrast">High Contrast Mode</div>
                    <div class="setting-desc" id="desc-high-contrast">For improved color vision</div>
                </div>
                <label class="switch">
                    <input type="checkbox" id="setting-high-contrast" onchange="toggleHighContrast(this.checked)">
                    <span class="slider"></span>
                </label>
            </div>

            <div class="setting-item">
                <div class="setting-text">
                    <div class="setting-label" id="label-language">Language</div>
                </div>
                <select id="lang-select-settings" onchange="changeLanguage(this.value)">
                    <option value="en">English</option>
                    <option value="zh">中文</option>
                </select>
            </div>

            <div class="settings-footer">
                <p>©
                    <script>document.write(new Date().getFullYear())</script> WordlePro
                </p>
            </div>
        </div>
    </div>

    <div id="loading">Loading dictionary...</div>
    <div id="toast-container"></div>

    <div id="main-layout">
        <aside id="hint-panel">
            <div id="hint-header">Possible Words</div>
            <div id="hint-list-container">
                <!-- 核心：使用 pre 标签处理成千上万个单词的换行 -->
                <pre id="hint-list-pre"></pre>
            </div>
        </aside>

        <main id="game-area">
            <div id="game-container">
                <div id="board"></div>
            </div>

            <div id="keyboard">
                <div class="keyboard-row" id="row1"></div>
                <div class="keyboard-row" id="row2"></div>
                <div class="keyboard-row" id="row3"></div>
            </div>
        </main>
    </div>

    <!-- 自定义确认弹窗 -->
    <div id="modal-overlay" class="modal-overlay">
        <div class="modal-content">
            <p id="modal-message"></p>
            <div class="modal-buttons">
                <button id="modal-cancel-btn" class="modal-btn cancel"></button>
                <button id="modal-confirm-btn" class="modal-btn confirm"></button>
            </div>
        </div>
    </div>

    <script>
        const ANSWERS_FILE = 'possible_words.txt';
        const ALLOWED_FILE = 'allowed_words.txt';

        let targetWord = "";
        let validGuesses = new Set();
        let answersPool = [];
        let currentGuess = "";
        let guesses = [];
        let isAnimating = false;
        let initialized = false;
        let gameOverToast = null;
        let gameStatus = "playing";
        let hintsVisible = false;
        let bounceTimeouts = []; // 用于追踪胜利跳动的计时器
        let hardMode = localStorage.getItem('wordle_hard_mode') === 'true';
        let highContrast = localStorage.getItem('wordle_high_contrast') === 'true';

        let constraints = {
            correct: Array(5).fill(null),
            present: {},
            absent: new Set()
        };

        let gameMode = localStorage.getItem('wordle_game_mode') || "normal";
        let currentLang = localStorage.getItem('language') || 'en';
        let combinedPool = [];   // 存放所有合法词汇
        let isResetting = false; // 重新加载按钮的冷却锁
        let isModeChanging = false; // 冷却状态锁

        const i18n = {
            en: {
                play: "Play",
                subtitle: "Get 6 chances to guess a <span style='white-space:nowrap'>5-letter</span> word.",
                newGame: "New Game Started",
                notEnough: "Not enough letters",
                notInList: "Not in word list",
                allMode: "Mode: All Words",
                commonMode: "Mode: Common Words",
                confirmReset: "Are you sure you want to restart? Your current progress will be lost.",
                confirmMode: "Switching modes will restart the game. Continue?",
                possible: "Possible",
                possibleWords: "Possible Words",
                praises: ["Genius", "Magnificent", "Impressive", "Splendid", "Great", "Phew"],
                cancel: "Cancel",
                confirm: "Confirm",
                settings: "SETTINGS",
                hardMode: "Hard Mode",
                hardModeDesc: "Any revealed hints must be used in subsequent guesses",
                darkMode: "Dark Mode",
                highContrast: "High Contrast Mode",
                highContrastDesc: "For improved color vision",
                language: "Language",
                hardModeGreen: "Hard Mode: {pos} letter must be {char}",
                hardModeYellow: "Hard Mode: Must contain {char}",
                ordinals: ["1st", "2nd", "3rd", "4th", "5th"]
            },
            zh: {
                play: "开始游戏",
                subtitle: "你有 6 次机会猜出一个 5 个字母的单词。",
                newGame: "新游戏已开始",
                notEnough: "字数不足",
                notInList: "单词不在词库中",
                allMode: "模式：全部词汇",
                commonMode: "模式：常用词汇",
                confirmReset: "确定要重新开始吗？当前进度将丢失。",
                confirmMode: "切换模式将重启游戏。是否继续？",
                possible: "个可能",
                possibleWords: "候选词汇",
                praises: ["天才", "太棒了", "出色", "精彩", "不错", "险胜"],
                cancel: "取消",
                confirm: "确定",
                settings: "设置",
                hardMode: "困难模式",
                hardModeDesc: "所有提示必须在后续猜测中使用",
                darkMode: "深色模式",
                highContrast: "高对比度模式",
                highContrastDesc: "优化颜色区分",
                language: "语言",
                hardModeGreen: "困难模式：第 {pos} 个字母必须是 {char}",
                hardModeYellow: "困难模式：必须包含 {char}",
                ordinals: ["1", "2", "3", "4", "5"] // 中文直接用数字
            }
        };


        // --- 初始化补充 ---
        function initSettings() {
            if (highContrast) document.body.classList.add('high-contrast');
            // 更新设置面板翻译
            updateUILanguage();
        }

        // --- 设置面板控制函数 ---
        function openSettings() {
            document.getElementById('settings-modal').style.display = 'flex';
            // 同步开关状态
            document.getElementById('setting-hard-mode').checked = hardMode;
            document.getElementById('setting-dark-mode').checked = document.body.classList.contains('dark-mode');
            document.getElementById('setting-high-contrast').checked = highContrast;
            document.getElementById('lang-select-settings').value = currentLang;
        }

        function closeSettings() {
            document.getElementById('settings-modal').style.display = 'none';
        }

        function toggleHardMode(checked) {
            if (checked && isGameDirty()) {
                showToast(currentLang === 'zh' ? "困难模式只能在游戏开始前开启" : "Hard mode can only be enabled at the start");
                document.getElementById('setting-hard-mode').checked = false;
                return;
            }
            hardMode = checked;
            localStorage.setItem('wordle_hard_mode', hardMode);
        }

        function toggleHighContrast(checked) {
            highContrast = checked;
            localStorage.setItem('wordle_high_contrast', highContrast);
            document.body.classList.toggle('high-contrast', highContrast);
        }

        function updateUILanguage() {
            const t = i18n[currentLang];
            // 更新起始页
            const playBtn = document.querySelector('.play-btn');
            if (playBtn) playBtn.textContent = t.play;
            const subtitle = document.querySelector('.start-subtitle');
            if (subtitle) subtitle.innerHTML = t.subtitle;

            // 更新提示面板标题
            const hintHeaderTitle = document.getElementById('hint-header-title'); // 如果你给标题加了ID
            // 简单起见，直接定位
            document.getElementById('hint-header').firstChild.textContent = t.possibleWords;

            // 更新选择框的值
            document.getElementById('settings-title').textContent = t.settings;
            document.getElementById('label-hard-mode').textContent = t.hardMode;
            document.getElementById('desc-hard-mode').textContent = t.hardModeDesc;
            document.getElementById('label-dark-mode').textContent = t.darkMode;
            document.getElementById('label-high-contrast').textContent = t.highContrast;
            document.getElementById('desc-high-contrast').textContent = t.highContrastDesc;
            document.getElementById('label-language').textContent = t.language;

            // 更新当前的提示列表（词频后缀等）
            updateHintList();
        }

        function changeLanguage(lang) {
            currentLang = lang;
            localStorage.setItem('language', lang);
            updateUILanguage();
        }

        function showCustomConfirm(message) {
            return new Promise((resolve) => {
                const overlay = document.getElementById('modal-overlay');
                const msgEl = document.getElementById('modal-message');
                const cancelBtn = document.getElementById('modal-cancel-btn');
                const confirmBtn = document.getElementById('modal-confirm-btn');

                // 设置文本
                msgEl.textContent = message;
                cancelBtn.textContent = i18n[currentLang].cancel;
                confirmBtn.textContent = i18n[currentLang].confirm;

                // 显示弹窗
                overlay.style.display = 'flex';

                // 处理点击
                const cleanup = (result) => {
                    overlay.style.display = 'none';
                    cancelBtn.onclick = null;
                    confirmBtn.onclick = null;
                    resolve(result);
                };

                cancelBtn.onclick = () => cleanup(false);
                confirmBtn.onclick = () => cleanup(true);
            });
        }

        async function initGame() {
            try {
                const [res1, res2] = await Promise.all([fetch(ANSWERS_FILE), fetch(ALLOWED_FILE)]);
                const text1 = await res1.text();
                const text2 = await res2.text();

                // 正常模式词池 (常用词)
                answersPool = text1.split(/\r?\n/).map(w => w.trim().toUpperCase()).filter(w => w.length === 5).sort();
                const allowed = text2.split(/\r?\n/).map(w => w.trim().toUpperCase()).filter(w => w.length === 5);

                // 验证集
                validGuesses = new Set([...answersPool, ...allowed]);
                // 所有词汇模式词池 (全量)
                combinedPool = Array.from(validGuesses).sort();

                // 确保初始化图标与保存的模式一致
                const icon = document.getElementById('mode-icon');
                if (gameMode === "all") {
                    const WORLD_PATH = 'M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z';
                    icon.innerHTML = `<path d="${WORLD_PATH}"/>`;
                }

                startNewRound();
                document.getElementById('loading').style.display = 'none';
                document.getElementById('board').style.visibility = 'visible';
                initialized = true;
            } catch (e) {
                document.getElementById('loading').textContent = "Dictionary Load Error.";
            }
        }

        function startNewRound() {
            if (gameOverToast) { gameOverToast.remove(); gameOverToast = null; }

            // 清理跳动计时器和数组
            bounceTimeouts.forEach(clearTimeout);
            bounceTimeouts = [];

            const pool = (gameMode === "normal") ? answersPool : combinedPool;
            targetWord = pool[Math.floor(Math.random() * pool.length)];
            console.log(targetWord);

            currentGuess = "";
            guesses = [];
            gameStatus = "playing";
            constraints = { correct: Array(5).fill(null), present: {}, absent: new Set() };
            updateHintList();

            document.querySelectorAll('.tile').forEach(tile => {
                tile.textContent = "";
                tile.removeAttribute("data-state");
                // 确保这里包含 "bounce"
                tile.classList.remove("pop", "shake", "flip", "bounce");
            });
            document.querySelectorAll('.key').forEach(key => {
                key.removeAttribute("data-state");
                key.style.backgroundColor = "";
                key.style.color = "";
            });
        }

        async function toggleWordMode() {
            if (isModeChanging || isAnimating) return;

            // 如果有进度，弹出原生确认框
            if (isGameDirty()) {
                // 核心修改：等待异步确认
                const confirmed = await showCustomConfirm(i18n[currentLang].confirmMode);
                if (!confirmed) return;
            }

            const btn = document.getElementById('mode-toggle-btn');
            const icon = document.getElementById('mode-icon');

            isModeChanging = true;
            btn.disabled = true;

            const STAR_PATH = 'M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z';
            const WORLD_PATH = 'M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z';

            if (gameMode === "normal") {
                gameMode = "all";
                icon.innerHTML = `<path d="${WORLD_PATH}"/>`;
                showToast(i18n[currentLang].allMode);
            } else {
                gameMode = "normal";
                icon.innerHTML = `<path d="${STAR_PATH}"/>`;
                showToast(i18n[currentLang].commonMode);
            }

            // 保存到本地存储
            localStorage.setItem('wordle_game_mode', gameMode);

            startNewRound();

            setTimeout(() => {
                isModeChanging = false;
                btn.disabled = false;
            }, 5000);
        }

        // --- 新增模式切换函数 ---
        function toggleMode() {
            if (isAnimating) return;

            const modeIcon = document.getElementById('mode-icon');
            // 星星图标 (Normal)
            const STAR_PATH = 'M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z';
            // 地球/所有图标 (All)
            const WORLD_PATH = 'M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z';

            if (gameMode === "normal") {
                gameMode = "all";
                modeIcon.innerHTML = `<path d="${WORLD_PATH}"/>`;
                showToast("Mode: All Words (Harder)");
            } else {
                gameMode = "normal";
                modeIcon.innerHTML = `<path d="${STAR_PATH}"/>`;
                showToast("Mode: Common Words (Normal)");
            }

            startNewRound();
        }

        function toggleHints() {
            hintsVisible = !hintsVisible;
            const panel = document.getElementById('hint-panel');
            panel.style.display = hintsVisible ? 'flex' : 'none';
            if (hintsVisible) updateHintList();
        }

        function updateHintList() {
            const listPre = document.getElementById('hint-list-pre');
            if (!listPre) return;

            const currentPool = (gameMode === "normal") ? answersPool : combinedPool;

            const possible = currentPool.filter(word => {
                for (let i = 0; i < 5; i++) {
                    if (constraints.correct[i] && word[i] !== constraints.correct[i]) return false;
                }
                for (let char in constraints.present) {
                    if (!word.includes(char)) return false;
                    for (let pos of constraints.present[char]) {
                        if (word[pos] === char) return false;
                    }
                }
                for (let char of constraints.absent) {
                    if (constraints.correct.includes(char) || constraints.present[char]) continue;
                    if (word.includes(char)) return false;
                }
                return true;
            });

            document.getElementById('hint-header').textContent = `${possible.length} ${i18n[currentLang].possible}`;

            // 使用 \n 换行，textContent 性能极高，不会导致卡死
            listPre.textContent = possible.join('\n');
        }

        async function resetGame() {
            if (isResetting || isAnimating) return;

            if (isGameDirty()) {
                // 核心修改：等待异步确认
                const confirmed = await showCustomConfirm(i18n[currentLang].confirmReset);
                if (!confirmed) return;
            }

            const btn = document.getElementById('reset-btn');
            isResetting = true;
            if (btn) btn.disabled = true;

            if (document.activeElement) document.activeElement.blur();

            startNewRound();
            showToast(i18n[currentLang].newGame);

            setTimeout(() => {
                isResetting = false;
                if (btn) btn.disabled = false;
            }, 5000);
        }

        const board = document.getElementById("board");
        for (let i = 0; i < 30; i++) {
            const tile = document.createElement("div");
            tile.className = "tile";
            tile.id = "tile-" + i;
            board.appendChild(tile);
        }

        const keyRows = [['Q', 'W', 'E', 'R', 'T', 'Y', 'U', 'I', 'O', 'P'], ['A', 'S', 'D', 'F', 'G', 'H', 'J', 'K', 'L'], ['ENTER', 'Z', 'X', 'C', 'V', 'B', 'N', 'M', '⌫']];
        keyRows.forEach((row, idx) => {
            const rowEl = document.getElementById(`row${idx + 1}`);
            row.forEach(key => {
                const btn = document.createElement("button");
                btn.className = "key";
                if (key === "ENTER" || key === "⌫") btn.classList.add("wide");
                btn.dataset.key = key;
                if (key === "⌫") {
                    btn.innerHTML = `<svg viewBox="0 0 24 24"><path d="M22 3H7c-.69 0-1.23.35-1.59.88L0 12l5.41 8.11c.36.53.9.89 1.59.89h15c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H7.07L2.4 12l4.66-7H22v14zm-11.59-2L14 13.41 17.59 17 19 15.59 15.41 12 19 8.41 17.59 7 14 10.59 10.41 7 9 8.41 12.59 12 9 15.59z"></path></svg>`;
                } else {
                    btn.textContent = key;
                }
                btn.onclick = (e) => { handleInput(key); e.currentTarget.blur(); };
                rowEl.appendChild(btn);
            });
        });

        function handleInput(key) {
            if (!initialized || isAnimating || gameStatus !== "playing") return;

            if (key === "ENTER") {
                validateAndSubmit();
            } else if (key === "⌫" || key === "Backspace") {
                if (currentGuess.length > 0) {
                    const idx = guesses.length * 5 + currentGuess.length - 1;
                    const tile = document.getElementById(`tile-${idx}`);
                    tile.textContent = "";
                    tile.removeAttribute("data-state");
                    tile.classList.remove("pop");
                    currentGuess = currentGuess.slice(0, -1);
                }
            } else if (/^[A-Z]$/.test(key.toUpperCase()) && currentGuess.length < 5) {
                const char = key.toUpperCase();
                const idx = guesses.length * 5 + currentGuess.length;
                const tile = document.getElementById(`tile-${idx}`);
                tile.textContent = char;
                tile.setAttribute("data-state", "filled");
                tile.classList.remove("pop");
                void tile.offsetWidth;
                tile.classList.add("pop");
                currentGuess += char;
            }
        }

        document.onkeydown = (e) => {
            if (e.key === "Enter" && document.activeElement) document.activeElement.blur();
            handleInput(e.key === "Enter" ? "ENTER" : e.key === "Backspace" ? "⌫" : e.key.toUpperCase());
        };

        // --- 困难模式逻辑拦截 ---
        // 修改 validateAndSubmit 函数，在有效性检查后增加困难模式检查：
        async function validateAndSubmit() {
            if (currentGuess.length < 5) {
                showToast(i18n[currentLang].notEnough);
                shakeRow(); return;
            }

            // --- 困难模式校验逻辑 ---
            if (hardMode && guesses.length > 0) {
                const t = i18n[currentLang];

                // 1. 检查绿色 (正确位置)
                for (let i = 0; i < 5; i++) {
                    const requiredChar = constraints.correct[i];
                    if (requiredChar && currentGuess[i] !== requiredChar) {
                        const coloredChar = `<span class="toast-green">${requiredChar}</span>`;
                        // 替换模板中的 {pos} 和 {char}
                        const msg = t.hardModeGreen
                            .replace("{pos}", t.ordinals[i])
                            .replace("{char}", coloredChar);

                        showToast(msg);
                        shakeRow(); return;
                    }
                }

                // 2. 检查黄色 (必须包含)
                for (let char in constraints.present) {
                    if (!currentGuess.includes(char)) {
                        const coloredChar = `<span class="toast-yellow">${char}</span>`;
                        // 替换模板中的 {char}
                        const msg = t.hardModeYellow
                            .replace("{char}", coloredChar);

                        showToast(msg);
                        shakeRow(); return;
                    }
                }
            }
            // -----------------------

            if (!validGuesses.has(currentGuess)) {
                showToast(i18n[currentLang].notInList);
                shakeRow(); return;
            }
            submitGuess();
        }

        function shakeRow() {
            const startIdx = guesses.length * 5;
            for (let i = 0; i < 5; i++) {
                const tile = document.getElementById(`tile-${startIdx + i}`);
                tile.classList.remove("shake");
                void tile.offsetWidth;
                tile.classList.add("shake");
                setTimeout(() => tile.classList.remove("shake"), 600);
            }
        }

        function submitGuess() {
            isAnimating = true;
            const startIdx = guesses.length * 5;
            const guessString = currentGuess;
            const guessArr = guessString.split("");
            const targetArr = [...targetWord];
            const states = Array(5).fill("absent");

            guessArr.forEach((c, i) => {
                if (c === targetArr[i]) {
                    states[i] = "correct";
                    targetArr[i] = null;
                    constraints.correct[i] = c;
                }
            });
            guessArr.forEach((c, i) => {
                if (states[i] !== "correct" && targetArr.includes(c)) {
                    states[i] = "present";
                    targetArr[targetArr.indexOf(c)] = null;
                    if (!constraints.present[c]) constraints.present[c] = [];
                    constraints.present[c].push(i);
                } else if (states[i] === "absent") {
                    constraints.absent.add(c);
                }
            });

            guessArr.forEach((char, i) => {
                const tile = document.getElementById(`tile-${startIdx + i}`);
                setTimeout(() => {
                    tile.classList.remove("pop", "shake", "flip");
                    void tile.offsetWidth;
                    tile.classList.add("flip");
                    setTimeout(() => tile.setAttribute("data-state", states[i]), 250);
                }, i * 300);
            });

            // 修改 submitGuess 函数内部最后的 setTimeout 部分
            setTimeout(() => {
                guessArr.forEach((char, i) => updateKey(char, states[i]));

                // 注意：这里不再立即执行 isAnimating = false;

                if (guessString === targetWord) {
                    gameStatus = "won";
                    showToast(i18n[currentLang].praises[guesses.length - 1]);

                    // 执行跳动逻辑
                    const startIdx = (guesses.length - 1) * 5;
                    for (let i = 0; i < 5; i++) {
                        const tile = document.getElementById(`tile-${startIdx + i}`);
                        const tId = setTimeout(() => {
                            tile.classList.add("bounce");
                        }, i * 100);
                        bounceTimeouts.push(tId);
                    }

                    // 【核心修复】胜利时，额外锁定 1500ms (400ms延迟 + 1000ms动画 + 100ms缓冲)
                    // 只有跳完之后，isAnimating 才会变回 false，resetGame 才能继续
                    setTimeout(() => {
                        isAnimating = false;
                        if (hintsVisible) updateHintList();
                    }, 1500);

                } else {
                    // 如果没赢，在翻牌结束后立即解锁
                    isAnimating = false;
                    if (guesses.length === 6) {
                        gameStatus = "lost";
                        showToast(targetWord, true);
                    }
                    if (hintsVisible) updateHintList();
                }
            }, 1700);

            guesses.push(guessString);
            currentGuess = "";
        }

        function updateKey(char, state) {
            const key = document.querySelector(`.key[data-key="${char}"]`);
            if (!key) return;
            const current = key.getAttribute("data-state");
            if (state === "correct") {
                key.setAttribute("data-state", "correct");
                key.style.backgroundColor = "var(--green)";
            } else if (state === "present" && current !== "correct") {
                key.setAttribute("data-state", "present");
                key.style.backgroundColor = "var(--yellow)";
            } else if (!current) {
                key.setAttribute("data-state", "absent");
                key.style.backgroundColor = "var(--gray)";
            }
            key.style.color = "white";
        }

        function showToast(msg, persistent = false) {
            const t = document.createElement("div");
            t.className = "toast";
            // 核心修改：由 textContent 改为 innerHTML
            t.innerHTML = msg;
            document.getElementById("toast-container").appendChild(t);

            if (persistent) {
                gameOverToast = t;
            } else {
                setTimeout(() => {
                    t.classList.add("hide");
                    setTimeout(() => t.remove(), 450);
                }, 1800);
            }
        }

        // 设置当前日期显示
        function updateDate() {
            const options = { month: 'long', day: 'numeric', year: 'numeric' };
            const today = new Date().toLocaleDateString('en-US', options);
            const dateEl = document.getElementById('current-date');
            if (dateEl) dateEl.textContent = today;
        }

        // 关闭遮罩
        function dismissStartScreen() {
            const screen = document.getElementById('start-screen');
            screen.classList.add('hidden');
            // 遮罩消失后再移除 DOM，防止干扰点击
            setTimeout(() => screen.style.display = 'none', 300);
        }

        // 修改原有的 handleInput，增加遮罩状态判断
        const originalHandleInput = handleInput;
        handleInput = function (key) {
            const startScreen = document.getElementById('start-screen');
            // 如果封面还在，不处理任何输入
            if (startScreen && !startScreen.classList.contains('hidden')) return;
            originalHandleInput(key);
        };

        // 更新日期并控制遮罩
        function initStartScreen() {
            const options = { month: 'long', day: 'numeric', year: 'numeric' };
            const dateEl = document.getElementById('current-date');
            if (dateEl) dateEl.textContent = new Date().toLocaleDateString('en-US', options);
        }

        function dismissStartScreen() {
            const screen = document.getElementById('start-screen');
            screen.classList.add('hidden');
            setTimeout(() => screen.style.display = 'none', 300);
        }

        // 拦截键盘输入，防止在封面打开时可以玩游戏
        const oldHandleInput = handleInput;
        handleInput = function (key) {
            const screen = document.getElementById('start-screen');
            if (screen && !screen.classList.contains('hidden')) {
                // 如果按了回车也可以开始游戏
                if (key === "ENTER") dismissStartScreen();
                return;
            }
            oldHandleInput(key);
        };

        // 图标 SVG 路径
        const SUN_ICON = '<path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58c-.39-.39-1.03-.39-1.41 0s-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41L5.99 4.58zm12.37 12.37c-.39-.39-1.03-.39-1.41 0s-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41l-1.06-1.06zm1.06-12.37c-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06c.39-.38.39-1.02 0-1.41zM7.05 18.01c-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06c.39-.38.39-1.02 0-1.41z"/>';
        const MOON_ICON = '<path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9c0-.46-.04-.92-.1-1.36-.98 1.37-2.58 2.26-4.4 2.26-2.98 0-5.4-2.42-5.4-5.4 0-1.81.89-3.42 2.26-4.4-.44-.06-.9-.1-1.36-.1z"/>';

        function initTheme() {
            const savedTheme = localStorage.getItem('theme');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            const isDark = savedTheme === 'dark' || (!savedTheme && prefersDark);

            // 应用样式到 body
            document.body.classList.toggle('dark-mode', isDark);

            // 安全地更新设置面板里的 Checkbox
            const themeCheckbox = document.getElementById('setting-dark-mode');
            if (themeCheckbox) {
                themeCheckbox.checked = isDark;
            }

            // 安全地更新旧有的 Header 图标 (如果它还存在的话)
            const themeIcon = document.getElementById('theme-icon');
            if (themeIcon) {
                themeIcon.innerHTML = isDark ? SUN_ICON : MOON_ICON;
            }
        }

        function toggleTheme(checked) {
            const isDark = checked !== undefined ? checked : !document.body.classList.contains('dark-mode');
            document.body.classList.toggle('dark-mode', isDark);
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            document.getElementById('theme-icon').innerHTML = isDark ? SUN_ICON : MOON_ICON;
        }

        function showToast(msg, persistent = false) {
            const t = document.createElement("div");
            t.className = "toast";
            t.innerHTML = msg;
            document.getElementById("toast-container").appendChild(t);

            if (persistent) {
                gameOverToast = t;
            } else {
                // 1.8秒后开始消失动画
                setTimeout(() => {
                    t.classList.add("hide"); // 触发 CSS 里的平滑收缩动画

                    // 等待动画结束后（400ms CSS 过渡时间）再彻底移除元素
                    setTimeout(() => {
                        t.remove();
                    }, 450);
                }, 1800);
            }
        }

        // --- 辅助函数：判断当前是否有游戏进度 ---
        function isGameDirty() {
            // 满足以下任一条件即视为“有进度”：
            // 1. 已经提交过至少一个单词 (guesses.length > 0)
            // 2. 当前行已经输入了字母 (currentGuess.length > 0)
            // 且游戏还在进行中 (gameStatus === "playing")
            return (guesses.length > 0 || currentGuess.length > 0) && gameStatus === "playing";
        }

        updateUILanguage();
        updateDate();
        initStartScreen();
        initSettings();
        initTheme();
        if (localStorage.getItem('wordle_high_contrast') === 'true') {
            document.body.classList.add('high-contrast');
        }
        initGame();
    </script>
