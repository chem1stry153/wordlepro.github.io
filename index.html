<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wordle</title>
    <link rel="icon" type="image/png" href="wordle_logo_32x32.png">

    <!-- 引入字体 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Franklin:wght@100..900&family=Roboto+Slab:wght@100..900&display=swap" rel="stylesheet">

    <style>
        body {
            background-color: #e3e3e1; /* 官网米灰色背景 */
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Libre Franklin', sans-serif;
            color: #000;
            overflow-x: hidden;
        }

        .portal-content {
            text-align: center;
            width: 95%;
            max-width: 800px;
            padding: 20px 0;
        }

        /* 保持 80px 大小 */
        .portal-logo {
            width: 80px;
            height: 80px;
            margin-bottom: 12px;
        }

        /* 保持 50px 大小 */
        .portal-title {
            font-family: 'Roboto Slab', serif;
            font-size: 50px;
            font-weight: 700;
            margin: 0 0 36px;
        }

        /* 卡片容器布局 */
        .card-container {
            display: flex;
            gap: 24px;
            justify-content: center;
            flex-wrap: wrap; /* 手机端自动换行 */
        }

        /* 卡片基础样式 */
        .game-card {
            background-color: #ffffff;
            border: 1px solid #d3d6da;
            border-radius: 12px;
            padding: 32px 24px;
            width: 320px;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .game-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 24px rgba(0,0,0,0.1);
            border-color: #878a8c;
        }

        .game-card:active {
            transform: translateY(-4px);
        }

        .card-title {
            font-family: 'Roboto Slab', serif;
            font-size: 26px;
            font-weight: 700;
            margin: 0 0 16px;
        }

        .card-desc {
            font-size: 14px;
            line-height: 1.6;
            color: #4a4a4a;
            margin: 0;
            text-align: left; /* 说明文字左对齐更易读 */
        }

        /* 强调普通/困难颜色的线条 */
        .card-accent {
            width: 50px;
            height: 6px;
            border-radius: 3px;
            margin-bottom: 20px;
        }
        .accent-wordle { background-color: #6aaa64; } /* 绿色 */
        .accent-hard { background-color: #3a3a3c; }   /* 深灰 */

        /* 顶部语言切换 */
        .lang-switcher {
            position: absolute;
            top: 20px;
            right: 20px;
        }

        #lang-select {
            background: transparent;
            border: 1px solid #878a8c;
            border-radius: 4px;
            padding: 4px 8px;
            font-size: 14px;
            cursor: pointer;
            outline: none;
        }

        /* 适配移动端 */
        @media (max-width: 600px) {
            .portal-title { font-size: 40px; }
            .game-card { width: 100%; max-width: 340px; }
            .card-container { padding: 0 20px; }
        }
    </style>
</head>

<body>
    <div class="lang-switcher">
        <select id="lang-select" onchange="changeLanguage(this.value)">
            <option value="en">English</option>
            <option value="zh">中文</option>
        </select>
    </div>

    <div class="portal-content">
        <img src="wordle-icon.svg" class="portal-logo" alt="Logo">
        <h1 class="portal-title">Wordle</h1>
        
        <div class="card-container">
            <!-- Wordle 卡片 -->
            <a href="wordle.html" class="game-card">
                <div class="card-accent accent-wordle"></div>
                <h2 class="card-title" id="title-wordle">Wordle</h2>
                <p class="card-desc" id="desc-wordle"></p>
            </a>

            <!-- Hard Wordle 卡片 -->
            <a href="hard_wordle.html" class="game-card">
                <div class="card-accent accent-hard"></div>
                <h2 class="card-title" id="title-hard">Hard Wordle</h2>
                <p class="card-desc" id="desc-hard"></p>
            </a>
        </div>
    </div>

    <script>
        let currentLang = localStorage.getItem('language') || 'en';

        const i18n = {
            en: {
                wordleTitle: "Standard Mode",
                wordleDesc: "The classic experience. Get <strong>6 chances</strong> to guess a 5-letter word. <strong>After each guess, tiles change color</strong>: Green means the letter is correct and in the right spot; Yellow means the letter is in the word but wrong spot; Gray means it's not in the word.",
                hardTitle: "Logic Mode",
                hardDesc: "A Mastermind-style challenge. You get <strong>10 attempts</strong> attempts. Unlike standard mode, <strong>you won't know which specific positions are correct</strong>. Each row only displays the total count of matched letters (Green/Yellow/Gray) as a summary."
            },
            zh: {
                wordleTitle: "标准模式",
                wordleDesc: "经典玩法。共有 <strong>6 次机会</strong>猜出 5 字母单词。<strong>每次猜测后，方块颜色会改变</strong>：绿色代表字母和位置完全正确；黄色代表字母正确但位置错误；灰色代表单词中不包含该字母。",
                hardTitle: "逻辑模式",
                hardDesc: "珠玑妙算（Mastermind）风格。共有 <strong>10 次机会</strong>。<strong>系统不会告知具体哪个字母正确</strong>，而是在每行末尾通过汇总方块显示位置正确（绿）、字母正确（黄）和错误字母的总个数。"
            }
        };

        function updateUILanguage() {
            const t = i18n[currentLang];
            document.getElementById('title-wordle').textContent = t.wordleTitle;
            document.getElementById('desc-wordle').innerHTML = t.wordleDesc;
            document.getElementById('title-hard').textContent = t.hardTitle;
            document.getElementById('desc-hard').innerHTML = t.hardDesc;
            document.getElementById('lang-select').value = currentLang;
        }

        function changeLanguage(lang) {
            currentLang = lang;
            localStorage.setItem('language', lang);
            updateUILanguage();
        }

        updateUILanguage();
    </script>
</body>

</html>
